<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuyuz_98 — 後台管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#f5f0e8;--brown:#8b6f47;--dark:#2c2018;--mid:#6b4f35;
  --border:#e0d8cc;--light:#faf8f4;--muted:#999;--white:#fff;
  --green:#3b6d11;--green-bg:#eaf3de;--amber:#854f0b;--amber-bg:#faeeda;
  --purple:#3c3489;--purple-bg:#eeedfe;--blue:#185fa5;--blue-bg:#e6f1fb;
  --red:#a32d2d;--red-bg:#fcebeb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:'Hiragino Sans','Noto Sans TC',sans-serif;color:var(--dark)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:40px 36px;width:360px;text-align:center}
.login-logo{font-size:28px;font-weight:700;margin-bottom:6px}.login-logo span{color:var(--brown)}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--light);color:var(--dark);margin-bottom:12px;font-family:inherit}
.login-input:focus{outline:none;border-color:var(--brown)}
.login-btn{width:100%;padding:12px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.login-btn:hover{background:var(--mid)}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* ADMIN LAYOUT */
.admin{display:none;min-height:100vh}
.admin-nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.admin-logo{font-size:15px;font-weight:700}.admin-logo span{color:var(--brown)}
.admin-nav-right{display:flex;align-items:center;gap:12px}
.admin-tabs{display:flex;gap:3px}
.at{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;border:none}
.at.active{background:var(--brown);color:#fff}
.at:hover:not(.active){background:var(--light);color:var(--dark)}
.logout-btn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:var(--muted)}
.logout-btn:hover{color:var(--dark)}
.admin-body{padding:20px 24px;max-width:1200px;margin:0 auto}
.pg{display:none}.pg.on{display:block}

/* COMMON */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.sc{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:12px 14px}
.sl{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:500;letter-spacing:0.03em}
.sv{font-size:20px;font-weight:700;color:var(--dark)}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-box{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);color:var(--dark)}
.filter-sel{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);color:var(--dark)}
.new-btn{padding:7px 14px;background:var(--brown);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.new-btn:hover{background:var(--mid)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.bw{background:var(--amber-bg);color:var(--amber)}
.bp{background:var(--purple-bg);color:var(--purple)}
.ba{background:#e1f5ee;color:#0f6e56}
.bs{background:var(--green-bg);color:var(--green)}
.bpr{background:var(--blue-bg);color:var(--blue)}

/* TABLES */
.otable{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.oth{display:grid;grid-template-columns:90px minmax(0,1fr) 90px 90px 76px 110px 90px;padding:9px 13px;background:var(--light);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:600}
.otr{display:grid;grid-template-columns:90px minmax(0,1fr) 90px 90px 76px 110px 90px;padding:10px 13px;border-bottom:1px solid var(--border);font-size:13px;color:var(--dark);align-items:center;cursor:pointer}
.otr:hover{background:var(--light)}

/* PRODUCT MANAGEMENT */
.pm-list{display:flex;flex-direction:column;gap:8px}
.pm-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:12px 14px;display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center}
.pm-thumb{width:52px;height:52px;border-radius:10px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.pm-thumb img{width:100%;height:100%;object-fit:cover}

/* MODAL */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal-wrap.open{display:flex}
.modal{background:var(--white);border-radius:14px;width:480px;max-width:100%}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--light);display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0}
.modal-body{padding:16px 18px;max-height:70vh;overflow-y:auto}
.spec-table{width:100%;border-collapse:collapse}
.spec-table th{font-size:11px;color:var(--muted);padding:6px;text-align:left}
.spec-table input{padding:5px;border:1px solid var(--border);border-radius:6px;width:100%}

.toast-admin{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast-admin.show{opacity:1}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">✦ <span>yuyuz_98</span></div>
    <div class="login-sub">後台管理系統</div>
    <input type="password" class="login-input" id="pw-input" placeholder="請輸入管理員密碼">
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="login-err">密碼錯誤</div>
  </div>
</div>

<div id="admin-screen" class="admin">
  <nav class="admin-nav">
    <div class="admin-logo">✦ <span>yuyuz_98</span> 後台</div>
    <div class="admin-nav-right">
      <div class="admin-tabs">
        <button class="at active" onclick="sw('orders')">訂單管理</button>
        <button class="at" onclick="sw('inventory')">庫存</button>
        <button class="at" onclick="sw('products')">商品管理</button>
      </div>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </nav>
  <div class="admin-body">

    <div class="pg on" id="pg-orders">
      <div class="toolbar">
        <input class="search-box" id="o-search" placeholder="搜尋訂單..." oninput="renderOrders()">
        <button class="new-btn" onclick="loadAllData()">重新整理</button>
        <button class="new-btn" style="background:#3b6d11" onclick="exportOrders()">📤 匯出訂單</button>
      </div>
      <div class="otable">
        <div class="oth"><span>單號</span><span>商品</span><span>客戶</span><span>金額</span><span>到貨</span><span>進度</span><span>狀態</span></div>
        <div id="order-list"></div>
      </div>
    </div>

    <div class="pg" id="pg-inventory">
      <div id="inv-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px;"></div>
    </div>

    <div class="pg" id="pg-products">
      <div class="toolbar">
        <button class="new-btn" onclick="openProductModal()">+ 新增商品</button>
      </div>
      <div class="pm-list" id="pm-list"></div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="product-modal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-title">商品編輯</span><button class="modal-x" onclick="closeProductModal()">×</button></div>
    <div class="modal-body">
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:#999">名稱</label>
        <input id="pm-name" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px">
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:#999">規格</label>
        <table class="spec-table">
            <thead><tr><th>名稱</th><th>價格</th><th>庫存</th></tr></thead>
            <tbody id="spec-tbody"></tbody>
        </table>
        <button onclick="addSpecRow()" style="margin-top:5px">+ 新增規格</button>
      </div>
    </div>
    <div class="modal-footer" style="padding:15px; text-align:right">
      <button class="new-btn" onclick="saveProduct()">儲存</button>
    </div>
  </div>
</div>

<div class="toast-admin" id="toast-admin"></div>

<script>
const SUPABASE_URL = 'https://yxlpqbbugkbxcklmtkfx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bHBxYmJ1Z2tieGNrbG10a2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzcxNTYsImV4cCI6MjA5MjQ1MzE1Nn0.B_nPq2eZ_uq6cvxGa2JImftUQZ9Pi2gdGAXdES_Iiy4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === 'uu2101619') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    loadAllData();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
function doLogout() { sessionStorage.removeItem('admin_auth'); location.reload(); }

let products = [], orders = [], categories = [];

async function loadAllData() {
  showToast("資料讀取中...");
  await Promise.all([loadCategories(), loadProducts(), loadOrders()]);
  renderOrders();
  renderInventory();
  renderProductMgmt();
}

async function loadCategories() {
  const { data } = await sb.from('categories').select('*').order('sort_order');
  categories = data || [];
}

async function loadProducts() {
  const { data } = await sb.from('products').select('*').order('sort_order');
  // --- 關鍵修復邏輯 ---
  products = (data || []).map(p => {
    let s = [];
    try {
        s = typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs;
        if(!Array.isArray(s)) s = [{name:'預設', price: p.price || 0, stock: 0}];
    } catch(e) { s = [{name:'格式錯誤', price: 0, stock: 0}]; }
    return { ...p, specs: s };
  });
}

async function loadOrders() {
  const { data } = await sb.from('orders').select('*').order('created_at', {ascending:false});
  // --- 關鍵修復邏輯 ---
  orders = (data || []).map(o => {
    let it = [];
    try {
        it = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
    } catch(e) { it = []; }
    return { ...o, items: it };
  });
}

function renderOrders() {
  const list = document.getElementById('order-list');
  list.innerHTML = orders.map(o => `
    <div class="otr">
      <span>${o.order_id}</span>
      <span style="font-size:11px">${o.items.map(i=>i.product).join(', ')}</span>
      <span>${o.customer_name}</span>
      <span>$${o.amount}</span>
      <span>-</span>
      <span>-</span>
      <span>${o.status || '新訂單'}</span>
    </div>
  `).join('');
}

function renderInventory() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = products.map(p => `
    <div class="sc">
      <div class="sl">${p.name}</div>
      <div class="sv">${p.specs.reduce((sum, s)=>sum+(parseInt(s.stock)||0), 0)}</div>
    </div>
  `).join('');
}

function renderProductMgmt() {
  const list = document.getElementById('pm-list');
  list.innerHTML = products.map(p => `
    <div class="pm-card">
      <div class="pm-thumb">${p.emoji || '🎁'}</div>
      <div class="pm-info">
        <div class="pm-name">${p.name}</div>
        <div class="pm-meta">${p.specs.length} 個規格</div>
      </div>
      <button class="at active" onclick="deleteProduct(${p.id})">刪除</button>
    </div>
  `).join('');
}

async function deleteProduct(id) {
    if(!confirm("確定刪除商品？")) return;
    await sb.from('products').delete().eq('id', id);
    loadAllData();
}

function openProductModal() { document.getElementById('product-modal').classList.add('open'); }
function closeProductModal() { document.getElementById('product-modal').classList.remove('open'); }

function addSpecRow() {
    const tbody = document.getElementById('spec-tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><input class="s-n"></td><td><input type="number" class="s-p"></td><td><input type="number" class="s-s"></td>`;
    tbody.appendChild(tr);
}

async function saveProduct() {
    const name = document.getElementById('pm-name').value;
    const rows = document.querySelectorAll('#spec-tbody tr');
    const specs = Array.from(rows).map(r => ({
        name: r.querySelector('.s-n').value,
        price: parseInt(r.querySelector('.s-p').value) || 0,
        stock: parseInt(r.querySelector('.s-s').value) || 0
    }));
    
    await sb.from('products').insert([{ name, specs: JSON.stringify(specs), online: true }]);
    closeProductModal();
    loadAllData();
}

function exportOrders() {
    let csv = "\ufeff單號,客戶,金額,商品\n";
    orders.forEach(o => {
        csv += `${o.order_id},${o.customer_name},${o.amount},"${o.items.map(i=>i.product).join(';')}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `訂單匯出_${new Date().getTime()}.csv`;
    link.click();
}

function showToast(m) {
    const t = document.getElementById('toast-admin');
    t.textContent = m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadAllData();
}
</script>
</body>
</html>
