<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuyuz_98 — 偶像週邊專賣</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#f5f0e8;--brown:#8b6f47;--dark:#2c2018;--mid:#6b4f35;
  --border:#e0d8cc;--light:#faf8f4;--text-muted:#999;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:'Hiragino Sans','Noto Sans TC',sans-serif;color:var(--dark);min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{font-size:18px;font-weight:700;color:var(--dark);letter-spacing:0.05em}
.nav-logo span{color:var(--brown)}
.nav-cart{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--brown);color:#fff;border:none;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.nav-cart:hover{background:var(--mid)}
.cart-count{background:#fff;color:var(--brown);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* HERO */
.hero{background:#fff;border-bottom:1px solid var(--border);padding:32px 24px;text-align:center}
.hero-title{font-size:28px;font-weight:700;color:var(--dark);margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--text-muted)}

/* CAT TABS */
.cat-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;white-space:nowrap;position:sticky;top:56px;z-index:40}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.cat-tab.active{color:var(--brown);border-bottom-color:var(--brown)}
.cat-tab:hover:not(.active){color:var(--dark)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:24px}
.cat-section{margin-bottom:32px}
.cat-section-title{font-size:13px;font-weight:700;color:var(--brown);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}

/* PRODUCT CARD */
.product-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;cursor:pointer}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(44,32,24,0.1)}
.pc-img{width:100%;aspect-ratio:1;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-info{padding:12px}
.pc-name{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px;line-height:1.4}
.pc-price{font-size:13px;color:var(--brown);font-weight:500}
.pc-controls{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.pc-add{width:100%;padding:8px;background:var(--brown);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

/* MODALS */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:16px;width:480px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr-title{font-size:16px;font-weight:700}
.modal-x{width:32px;height:32px;border:none;background:var(--light);border-radius:8px;cursor:pointer;font-size:20px;color:var(--text-muted)}
.modal-body{padding:20px;overflow-y:auto;flex:1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2c2018;color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;z-index:300;transition:transform 0.3s ease}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">✦ <span>yuyuz_98</span></div>
  <div style="display:flex; gap:8px;">
    <button class="nav-cart" style="background:var(--mid); color:#fff;" onclick="openOrderLookup()">🔍 查訂單</button>
    <button class="nav-cart" onclick="openCart()">
      🛒 <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-title">✦ yuyuz_98</div>
  <div class="hero-sub">偶像週邊 · 美妝保養 · 服飾精選</div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<div class="main">
  <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted)">載入商品中...</div>
  <div id="product-area"></div>
  
  <div class="success-page" id="success-page" style="display:none; text-align:center; padding:40px;">
    <div style="font-size:64px;">🎉</div>
    <h2>下單成功！</h2>
    <p id="success-order-id" style="color:var(--brown); font-weight:bold; margin:20px 0;"></p>
    <button class="nav-cart" onclick="location.reload()">回到首頁</button>
  </div>
</div>

<div class="footer" style="text-align:center;padding:32px;color:var(--text-muted);font-size:12px;border-top:1px solid var(--border)">
  © yuyuz_98 · 所有商品皆為正品代購
</div>

<div class="modal-wrap" id="lookup-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-hdr">
      <span class="modal-hdr-title">訂單查詢</span>
      <button class="modal-x" onclick="closeLookup()">×</button>
    </div>
    <div class="modal-body">
      <input type="text" id="lookup-phone" placeholder="請輸入手機號碼" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px">
      <button class="pc-add" style="width:100%" onclick="doLookup()">開始查詢</button>
      <div id="lookup-result" style="margin-top:20px;"></div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="cart-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-hdr">
      <span class="modal-hdr-title">購物車</span>
      <button class="modal-x" onclick="document.getElementById('cart-modal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" id="cart-body"></div>
    <div style="padding:20px; border-top:1px solid #eee">
      <div style="display:flex; justify-content:space-between; margin-bottom:10px"><b>總計</b><b id="cart-total">NT$ 0</b></div>
      <button class="pc-add" id="checkout-btn" style="width:100%" onclick="openCheckout()">前往結帳</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="checkout-modal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-hdr-title">收件資料</span><button class="modal-x" onclick="closeCheckout()">×</button></div>
    <div class="modal-body">
      <input id="f-name" placeholder="姓名 *" style="width:100%;padding:10px;margin-bottom:10px">
      <input id="f-phone" placeholder="電話 *" style="width:100%;padding:10px;margin-bottom:10px">
      <input id="f-store" placeholder="門市名稱" style="width:100%;padding:10px;margin-bottom:10px">
      <button class="pc-add" style="width:100%" onclick="submitOrder()">確認下單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yxlpqbbugkbxcklmtkfx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bHBxYmJ1Z2tieGNrbG10a2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzcxNTYsImV4cCI6MjA5MjQ1MzE1Nn0.B_nPq2eZ_uq6cvxGa2JImftUQZ9Pi2gdGAXdES_Iiy4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let categories = [], products = [], cart = [], activeCat = 'all';
const pcQtyMap = {}, pcSpecMap = {};

async function init() {
  await loadData();
  renderCatBar();
  renderProducts();
}

async function loadData() {
  try {
    const { data: catData } = await sb.from('categories').select('*').order('sort_order');
    const { data: prodData, error } = await sb.from('products').select('*').eq('online', true).order('sort_order');
    
    if (error) throw error;

    categories = catData || [];
    products = (prodData || []).map(p => {
      let parsedSpecs = [];
      try {
        parsedSpecs = typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs;
      } catch (e) { parsedSpecs = [{name: '預設規格', price: p.price || 0}]; }
      return { ...p, specs: parsedSpecs };
    });
  } catch(e) {
    console.error("資料加載失敗:", e);
    document.getElementById('loading').innerHTML = "加載失敗，請檢查網路或權限設定。";
  }
  document.getElementById('loading').style.display = 'none';
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  const all = [{id:'all',label:'全部'}, ...categories];
  bar.innerHTML = all.map(c => `<span class="cat-tab ${activeCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.label}</span>`).join('');
}
function setCat(id) { activeCat = id; renderCatBar(); renderProducts(); }

function renderProducts() {
  const area = document.getElementById('product-area');
  const cats = activeCat === 'all' ? categories : categories.filter(c => c.id === activeCat);
  let html = '';
  
  cats.forEach(cat => {
    const list = products.filter(p => p.cat_id === cat.id);
    if (list.length) {
      html += `<div class="cat-section"><div class="cat-section-title">${cat.label}</div><div class="product-grid">`;
      list.forEach(p => {
        const specName = pcSpecMap[p.id] || p.specs[0].name;
        const spec = p.specs.find(s => s.name === specName) || p.specs[0];
        const qty = pcQtyMap[p.id] || 1;
        
        html += `<div class="product-card">
          <div class="pc-img">${p.photo ? `<img src="${p.photo}">` : `<span>${p.emoji||'🎁'}</span>`}</div>
          <div class="pc-info">
            <div class="pc-name">${p.name}</div>
            <div class="pc-price">NT$ ${spec.price.toLocaleString()}</div>
          </div>
          <div class="pc-controls">
            <select onchange="pcSpecMap[${p.id}]=this.value;renderProducts()">
              ${p.specs.map(s => `<option value="${s.name}" ${s.name===specName?'selected':''}>${s.name}</option>`).join('')}
            </select>
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 10px 0;">
              <button onclick="pcQtyMap[${p.id}]=Math.max(1,(pcQtyMap[${p.id}]||1)-1);renderProducts()">-</button>
              <span>${qty}</span>
              <button onclick="pcQtyMap[${p.id}]=(pcQtyMap[${p.id}]||1)+1;renderProducts()">+</button>
            </div>
            <button class="pc-add" onclick="addToCart(${p.id})">加入購物車</button>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
  });
  area.innerHTML = html || '<div style="text-align:center;color:#999">目前沒有商品</div>';
}

function addToCart(pid) {
  const p = products.find(x => x.id === pid);
  const specName = pcSpecMap[pid] || p.specs[0].name;
  const spec = p.specs.find(s => s.name === specName);
  const qty = pcQtyMap[pid] || 1;
  cart.push({ cartId: Date.now(), productId: pid, product: p.name, spec: specName, qty, price: spec.price });
  showToast("已加入購物車！");
  updateCartUI();
}

function updateCartUI() {
  const count = cart.reduce((s,i) => s+i.qty, 0);
  document.getElementById('cart-count').textContent = count;
}

function openCart() {
  const modal = document.getElementById('cart-modal');
  const body = document.getElementById('cart-body');
  modal.classList.add('open');
  if(!cart.length) { body.innerHTML = "購物車是空的"; return; }
  body.innerHTML = cart.map(i => `<div>${i.product} x ${i.qty} - $${(i.price*i.qty).toLocaleString()}</div>`).join('');
  document.getElementById('cart-total').textContent = 'NT$ ' + cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString();
}

function openOrderLookup() { document.getElementById('lookup-modal').classList.add('open'); }
function closeLookup() { document.getElementById('lookup-modal').classList.remove('open'); }

async function doLookup() {
  const phone = document.getElementById('lookup-phone').value.trim();
  if(!phone) return alert("請輸入電話");
  const resDiv = document.getElementById('lookup-result');
  resDiv.innerHTML = "查詢中...";
  const { data } = await sb.from('orders').select('*').eq('phone', phone).order('created_at', {ascending:false});
  if(data && data.length > 0) {
    resDiv.innerHTML = data.map(o => `<div style="border:1px solid #ddd; padding:10px; border-radius:8px; margin-bottom:10px;">
      <b>單號: ${o.order_id}</b><br>狀態: ${o.status || '處理中'}<br>金額: $${o.amount}
    </div>`).join('');
  } else { resDiv.innerHTML = "查無訂單"; }
}

function openCheckout() { document.getElementById('checkout-modal').classList.add('open'); }
function closeCheckout() { document.getElementById('checkout-modal').classList.remove('open'); }

async function submitOrder() {
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  if(!name || !phone) return alert("請填寫姓名與電話");
  
  const orderId = 'ORD' + Math.random().toString(36).substr(2, 6).toUpperCase();
  const { error } = await sb.from('orders').insert([{
    order_id: orderId, customer_name: name, phone: phone,
    amount: cart.reduce((s,i)=>s+(i.price*i.qty),0),
    items: JSON.stringify(cart),
    created_at: new Date().toISOString()
  }]);
  
  if(!error) {
    document.getElementById('success-order-id').textContent = "訂單編號：" + orderId;
    document.getElementById('product-area').style.display = 'none';
    document.getElementById('success-page').style.display = 'block';
    document.getElementById('checkout-modal').classList.remove('open');
    document.getElementById('cart-modal').classList.remove('open');
    cart = []; updateCartUI();
  } else { alert("下單失敗"); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
