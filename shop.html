<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星光代購 — 偶像週邊專賣</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#f5f0e8;--brown:#8b6f47;--dark:#2c2018;--mid:#6b4f35;
  --border:#e0d8cc;--light:#faf8f4;--text-muted:#999;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:'Hiragino Sans','Noto Sans TC',sans-serif;color:var(--dark);min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{font-size:18px;font-weight:700;color:var(--dark);letter-spacing:0.05em}
.nav-logo span{color:var(--brown)}
.nav-cart{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--brown);color:#fff;border:none;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.nav-cart:hover{background:var(--mid)}
.cart-count{background:#fff;color:var(--brown);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* HERO */
.hero{background:#fff;border-bottom:1px solid var(--border);padding:32px 24px;text-align:center}
.hero-title{font-size:28px;font-weight:700;color:var(--dark);margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--text-muted)}

/* CAT TABS */
.cat-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;white-space:nowrap;position:sticky;top:56px;z-index:40}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.cat-tab.active{color:var(--brown);border-bottom-color:var(--brown)}
.cat-tab:hover:not(.active){color:var(--dark)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:24px}
.cat-section{margin-bottom:32px}
.cat-section-title{font-size:13px;font-weight:700;color:var(--brown);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}

/* PRODUCT CARD */
.product-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;cursor:pointer}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(44,32,24,0.1)}
.product-card.in-cart{border-color:var(--brown);border-width:1.5px}
.pc-img{width:100%;aspect-ratio:1;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-img .cart-dot{position:absolute;top:8px;right:8px;background:var(--brown);color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pc-info{padding:12px}
.pc-name{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px;line-height:1.4}
.pc-price{font-size:13px;color:var(--brown);font-weight:500}
.pc-controls{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.pc-spec select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--light);color:var(--dark);cursor:pointer}
.pc-qty{display:flex;align-items:center;justify-content:space-between}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:background 0.1s}
.qty-btn:hover{background:var(--light)}
.qty-num{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.qty-price{font-size:12px;color:var(--brown);font-weight:600}
.pc-add{width:100%;padding:8px;background:var(--brown);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.pc-add:hover{background:var(--mid)}

/* CART DRAWER */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.4);z-index:100}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:100vw;background:#fff;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s ease}
.cart-overlay.open .cart-drawer{transform:translateX(0)}
.cart-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-hdr-title{font-size:16px;font-weight:700;color:var(--dark)}
.cart-close{width:32px;height:32px;border:none;background:var(--light);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.cart-body{flex:1;overflow-y:auto;padding:16px 20px}
.cart-empty-msg{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}
.cart-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.cart-item:last-child{border-bottom:none}
.ci-emoji{width:44px;height:44px;background:var(--light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.ci-emoji img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:2px}
.ci-spec{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.ci-bottom{display:flex;align-items:center;justify-content:space-between}
.ci-ctrl{display:flex;align-items:center;gap:6px}
.ci-qb{width:22px;height:22px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.ci-qb:hover{background:var(--light)}
.ci-qn{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.ci-price{font-size:13px;font-weight:600;color:var(--brown)}
.ci-rm{margin-left:8px;width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.ci-rm:hover{background:#fef0ef;color:#c0392b}
.cart-footer{padding:16px 20px;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--dark)}
.checkout-btn{width:100%;padding:14px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.15s}
.checkout-btn:hover{background:var(--mid)}
.checkout-btn:disabled{background:#d3c8b4;cursor:default}

/* CHECKOUT MODAL */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:16px;width:480px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr-title{font-size:16px;font-weight:700}
.modal-x{width:32px;height:32px;border:none;background:var(--light);border-radius:8px;cursor:pointer;font-size:20px;color:var(--text-muted)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.order-summary{background:var(--light);border-radius:10px;padding:12px 14px;margin-bottom:16px}
.os-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--dark)}
.os-total{font-weight:700;border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-size:14px}
.form-section{font-size:11px;font-weight:700;color:var(--brown);letter-spacing:0.05em;margin:16px 0 10px}
.form-section:first-of-type{margin-top:0}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.form-group label{font-size:11px;color:var(--text-muted);font-weight:500}
.form-group input,.form-group textarea{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--light);color:var(--dark);font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--brown)}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border);background:#fff;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:var(--dark)}
.btn-submit{flex:2;padding:12px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s}
.btn-submit:hover{background:var(--mid)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2c2018;color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:300;transition:transform 0.3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--brown);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{text-align:center;padding:32px 24px;color:var(--text-muted);font-size:12px;border-top:1px solid var(--border);margin-top:32px}

/* SUCCESS PAGE */
.success-page{display:none;text-align:center;padding:60px 20px}
.success-page.show{display:block}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px}
.success-msg{font-size:14px;color:var(--text-muted);margin-bottom:24px;line-height:1.6}
.success-order-id{font-size:16px;font-weight:700;color:var(--brown);background:var(--light);padding:10px 20px;border-radius:10px;display:inline-block;margin-bottom:24px}
.back-btn{padding:12px 28px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}

@media(max-width:600px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .main{padding:16px}
  .cart-drawer{width:100vw}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">✦ <span>星光代購</span></div>
  <button class="nav-cart" onclick="openCart()">
    🛒 購物車
    <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<div class="hero">
  <div class="hero-title">✦ 星光代購</div>
  <div class="hero-sub">偶像週邊 · 美妝保養 · 服飾精選</div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<div class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    載入商品中…
  </div>
  <div id="product-area"></div>
  <div class="success-page" id="success-page">
    <div class="success-icon">🎉</div>
    <div class="success-title">下單成功！</div>
    <div class="success-msg">感謝你的訂購，我們會盡快處理你的訂單。<br>請保留你的訂單編號方便查詢。</div>
    <div class="success-order-id" id="success-order-id"></div>
    <br>
    <button class="back-btn" onclick="backToShop()">繼續購物</button>
  </div>
</div>

<div class="footer">© 星光代購 · 所有商品皆為正品代購</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()">
  <div class="cart-drawer" onclick="event.stopPropagation()">
    <div class="cart-hdr">
      <span class="cart-hdr-title">購物車</span>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>
    <div class="cart-body" id="cart-body">
      <div class="cart-empty-msg">尚未加入任何商品</div>
    </div>
    <div class="cart-footer">
      <div class="cart-total"><span>合計</span><span id="cart-total">NT$ 0</span></div>
      <button class="checkout-btn" id="checkout-btn" onclick="openCheckout()" disabled>前往結帳</button>
    </div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-wrap" id="checkout-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-hdr-title">填寫收件資料</span>
      <button class="modal-x" onclick="closeCheckout()">×</button>
    </div>
    <div class="modal-body">
      <div class="order-summary" id="order-summary"></div>
      <div class="form-section">收件人資料</div>
      <div class="form-row">
        <div class="form-group"><label>姓名 *</label><input id="f-name" placeholder="請輸入姓名"></div>
        <div class="form-group"><label>電話 *</label><input id="f-phone" placeholder="09xxxxxxxx"></div>
      </div>
      <div class="form-group"><label>Email</label><input id="f-email" placeholder="example@email.com" type="email"></div>
      <div class="form-row">
        <div class="form-group"><label>超商門市</label><input id="f-store" placeholder="7-11 台南成功門市"></div>
        <div class="form-group"><label>超商店號</label><input id="f-storeno" placeholder="門市店號"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>IG 帳號</label><input id="f-ig" placeholder="@yourname"></div>
        <div class="form-group"><label>LINE 社群暱稱</label><input id="f-line" placeholder="你在社群的暱稱"></div>
      </div>
      <div class="form-group"><label>備註</label><textarea id="f-note" placeholder="特殊需求請備註"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeCheckout()">取消</button>
      <button class="btn-submit" id="submit-btn" onclick="submitOrder()">確認下單</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase 設定（上線前請替換）──────────────────────────
const SUPABASE_URL = 'https://yxlpqbbugkbxcklmtkfx.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bHBxYmJ1Z2tieGNrbG10a2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzcxNTYsImV4cCI6MjA5MjQ1MzE1Nn0.B_nPq2eZ_uq6cvxGa2JImftUQZ9Pi2gdGAXdES_Iiy4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
// ──────────────────────────────────────────────────────────

let categories = [];
let products = [];
let cart = [];
let activeCat = 'all';
const pcQtyMap = {}, pcSpecMap = {};

// 初始化
async function init() {
  await loadData();
  renderCatBar();
  renderProducts();
}

async function loadData() {
  try {
    const [catRes, prodRes] = await Promise.all([
      sb.from('categories').select('*').order('sort_order'),
      sb.from('products').select('*').eq('online', true).order('sort_order')
    ]);
    categories = catRes.data || [];
    products = (prodRes.data || []).map(p => ({
      ...p,
      specs: typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs
    }));
  } catch(e) {
    // demo mode if Supabase not configured
    categories = [
      {id:'twice',label:'TWICE'},{id:'ive',label:'IVE'},{id:'aespa',label:'aespa'},
      {id:'newjeans',label:'NewJeans'},{id:'lesserafim',label:'LE SSERAFIM'},
      {id:'blackpink',label:'BLACKPINK'},{id:'beauty',label:'美妝保養'},{id:'fashion',label:'服飾'}
    ];
    products = [
      {id:1,cat_id:'twice',name:'TWICE 官方手燈',emoji:'✨',photo:null,specs:[{name:'標準版',price:1200,stock:8},{name:'豪華版',price:1500,stock:7}],online:true},
      {id:2,cat_id:'ive',name:'IVE 周年寫真集',emoji:'📸',photo:null,specs:[{name:'一般版',price:880,stock:4},{name:'限定版',price:1080,stock:2},{name:'簽名版',price:1580,stock:2}],online:true},
      {id:3,cat_id:'aespa',name:'aespa 壓克力立牌',emoji:'🪄',photo:null,specs:[{name:'KARINA',price:350,stock:3},{name:'WINTER',price:350,stock:1},{name:'GISELLE',price:350,stock:4},{name:'NINGNING',price:350,stock:2}],online:true},
      {id:4,cat_id:'newjeans',name:'NewJeans 馬克杯',emoji:'☕',photo:null,specs:[{name:'藍色',price:480,stock:0},{name:'粉色',price:480,stock:0},{name:'白色',price:480,stock:0}],online:true},
      {id:5,cat_id:'lesserafim',name:'LE SSERAFIM T恤',emoji:'👕',photo:null,specs:[{name:'S',price:800,stock:1},{name:'M',price:850,stock:1},{name:'L',price:900,stock:0},{name:'XL',price:950,stock:0}],online:true},
      {id:6,cat_id:'blackpink',name:'BLACKPINK 鑰匙圈',emoji:'🔑',photo:null,specs:[{name:'JISOO',price:220,stock:0},{name:'JENNIE',price:220,stock:0},{name:'ROSÉ',price:220,stock:0},{name:'LISA',price:220,stock:0}],online:true},
      {id:7,cat_id:'beauty',name:'韓國限定唇釉',emoji:'💄',photo:null,specs:[{name:'#01 玫瑰紅',price:680,stock:8},{name:'#02 珊瑚橘',price:680,stock:6},{name:'#03 豆沙粉',price:680,stock:5}],online:true},
      {id:8,cat_id:'fashion',name:'韓版格紋外套',emoji:'🧥',photo:null,specs:[{name:'S',price:1480,stock:2},{name:'M',price:1480,stock:3},{name:'L',price:1580,stock:1}],online:true},
    ];
  }
  document.getElementById('loading').style.display = 'none';
}

function priceRange(p) {
  const prices = p.specs.map(s => s.price);
  const mn = Math.min(...prices), mx = Math.max(...prices);
  return mn === mx ? `NT$ ${mn.toLocaleString()}` : `NT$ ${mn.toLocaleString()} – ${mx.toLocaleString()}`;
}
function specPrice(p, name) {
  const s = p.specs.find(x => x.name === name);
  return s ? s.price : 0;
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  const all = [{id:'all',label:'全部'}, ...categories];
  bar.innerHTML = all.map(c =>
    `<span class="cat-tab${activeCat===c.id?' active':''}" onclick="setCat('${c.id}')">${c.label}</span>`
  ).join('');
}
function setCat(id) { activeCat = id; renderCatBar(); renderProducts(); }

function renderProducts() {
  const area = document.getElementById('product-area');
  const cats = activeCat === 'all' ? categories : [categories.find(c => c.id === activeCat)].filter(Boolean);
  let html = '';
  for (const cat of cats) {
    const list = products.filter(p => p.cat_id === cat.id);
    if (!list.length) continue;
    html += `<div class="cat-section"><div class="cat-section-title">${cat.label}</div><div class="product-grid">${list.map(renderCard).join('')}</div></div>`;
  }
  area.innerHTML = html || '<div class="loading">此分類暫無商品</div>';
}

function renderCard(p) {
  const inCart = cart.filter(i => i.productId === p.id).reduce((s, i) => s + i.qty, 0);
  const curSpec = pcSpecMap[p.id] || p.specs[0].name;
  const curPrice = specPrice(p, curSpec);
  const qty = pcQtyMap[p.id] || 1;
  const imgContent = p.photo ? `<img src="${p.photo}" alt="${p.name}">` : `<span>${p.emoji||'📦'}</span>`;
  const specOpts = p.specs.map(s =>
    `<option value="${s.name}"${s.name===curSpec?' selected':''}>${s.name} — NT$ ${s.price.toLocaleString()}</option>`
  ).join('');
  return `<div class="product-card${inCart>0?' in-cart':''}">
    <div class="pc-img">${imgContent}${inCart>0?`<span class="cart-dot">${inCart}</span>`:''}</div>
    <div class="pc-info">
      <div class="pc-name">${p.name}</div>
      <div class="pc-price">${priceRange(p)}</div>
    </div>
    <div class="pc-controls">
      <div class="pc-spec"><select onchange="onSpec(${p.id},this.value)">${specOpts}</select></div>
      <div class="pc-qty">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="qtyChange(${p.id},-1)">−</button>
          <span class="qty-num" id="qty-${p.id}">${qty}</span>
          <button class="qty-btn" onclick="qtyChange(${p.id},1)">+</button>
        </div>
        <span class="qty-price" id="qprice-${p.id}">NT$ ${(curPrice*qty).toLocaleString()}</span>
      </div>
      <button class="pc-add" onclick="addToCart(${p.id})">加入購物車</button>
    </div>
  </div>`;
}

function onSpec(pid, name) {
  pcSpecMap[pid] = name;
  const p = products.find(x => x.id === pid);
  if (!p) return;
  const qty = pcQtyMap[pid] || 1;
  const price = specPrice(p, name);
  const el = document.getElementById('qprice-' + pid);
  if (el) el.textContent = 'NT$ ' + (price * qty).toLocaleString();
}
function qtyChange(pid, d) {
  pcQtyMap[pid] = Math.max(1, (pcQtyMap[pid] || 1) + d);
  const p = products.find(x => x.id === pid);
  const name = pcSpecMap[pid] || (p ? p.specs[0].name : '');
  const price = p ? specPrice(p, name) : 0;
  const qty = pcQtyMap[pid];
  const qEl = document.getElementById('qty-' + pid);
  if (qEl) qEl.textContent = qty;
  const pEl = document.getElementById('qprice-' + pid);
  if (pEl) pEl.textContent = 'NT$ ' + (price * qty).toLocaleString();
}
function addToCart(pid) {
  const p = products.find(x => x.id === pid);
  if (!p) return;
  const spec = pcSpecMap[pid] || p.specs[0].name;
  const qty = pcQtyMap[pid] || 1;
  const price = specPrice(p, spec);
  const existing = cart.find(i => i.productId === pid && i.spec === spec);
  if (existing) { existing.qty += qty; }
  else { cart.push({ cartId: Date.now(), productId: pid, product: p.name, emoji: p.emoji, photo: p.photo, spec, qty, price }); }
  pcQtyMap[pid] = 1;
  const qEl = document.getElementById('qty-' + pid);
  if (qEl) qEl.textContent = 1;
  const pEl = document.getElementById('qprice-' + pid);
  if (pEl) pEl.textContent = 'NT$ ' + price.toLocaleString();
  renderProducts();
  renderCart();
  showToast(`已加入：${p.name}（${spec}）× ${qty}`);
}

function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount() { return cart.reduce((s, i) => s + i.qty, 0); }

function renderCart() {
  const cnt = cartCount();
  document.getElementById('cart-count').textContent = cnt;
  document.getElementById('checkout-btn').disabled = cart.length === 0;
  document.getElementById('cart-total').textContent = 'NT$ ' + cartTotal().toLocaleString();
  const body = document.getElementById('cart-body');
  if (!cart.length) { body.innerHTML = '<div class="cart-empty-msg">尚未加入任何商品</div>'; return; }
  body.innerHTML = cart.map(item => {
    const imgContent = item.photo ? `<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">` : `<span>${item.emoji||'📦'}</span>`;
    return `<div class="cart-item">
      <div class="ci-emoji">${imgContent}</div>
      <div class="ci-info">
        <div class="ci-name">${item.product}</div>
        <div class="ci-spec">${item.spec}</div>
        <div class="ci-bottom">
          <div class="ci-ctrl">
            <button class="ci-qb" onclick="ciQty(${item.cartId},-1)">−</button>
            <span class="ci-qn">${item.qty}</span>
            <button class="ci-qb" onclick="ciQty(${item.cartId},1)">+</button>
          </div>
          <div style="display:flex;align-items:center">
            <span class="ci-price">NT$ ${(item.price*item.qty).toLocaleString()}</span>
            <button class="ci-rm" onclick="removeCart(${item.cartId})">×</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
function ciQty(cid, d) {
  const i = cart.find(x => x.cartId === cid);
  if (!i) return;
  i.qty = Math.max(1, i.qty + d);
  renderCart(); renderProducts();
}
function removeCart(cid) {
  cart = cart.filter(i => i.cartId !== cid);
  renderCart(); renderProducts();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
}

function openCheckout() {
  if (!cart.length) return;
  const summary = document.getElementById('order-summary');
  summary.innerHTML = cart.map(i =>
    `<div class="os-row"><span>${i.product}（${i.spec}）× ${i.qty}</span><span>NT$ ${(i.price*i.qty).toLocaleString()}</span></div>`
  ).join('') + `<div class="os-row os-total"><span>合計 ${cartCount()} 件</span><span>NT$ ${cartTotal().toLocaleString()}</span></div>`;
  document.getElementById('checkout-modal').classList.add('open');
  closeCart();
}
function closeCheckout() {
  document.getElementById('checkout-modal').classList.remove('open');
}

async function submitOrder() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !phone) { showToast('請填寫姓名與電話'); return; }
  const btn = document.getElementById('submit-btn');
  btn.textContent = '處理中…'; btn.disabled = true;
  const email = document.getElementById('f-email').value.trim();
  const store = document.getElementById('f-store').value.trim();
  const storeno = document.getElementById('f-storeno').value.trim();
  const ig = document.getElementById('f-ig').value.trim();
  const line = document.getElementById('f-line').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const orderId = 'ORD-' + Date.now().toString(36).toUpperCase();
  const amount = cartTotal();
  const items = cart.map(i => ({ productId: i.productId, product: i.product, spec: i.spec, qty: i.qty, price: i.price, arrivedQty: 0 }));
  try {
    await sb.from('orders').insert([{
      order_id: orderId, customer_name: name, phone, email,
      store, store_no: storeno, ig, line_nickname: line, note,
      amount, items: JSON.stringify(items), status: '',
      created_at: new Date().toISOString()
    }]);
    // upsert customer
    await sb.from('customers').upsert([{ phone, name, email }], { onConflict: 'phone', ignoreDuplicates: false });
  } catch(e) {
    // demo mode
    console.log('Demo order:', { orderId, name, phone, items });
  }
  closeCheckout();
  cart = [];
  renderCart(); renderProducts();
  ['f-name','f-phone','f-email','f-store','f-storeno','f-ig','f-line','f-note'].forEach(id => { document.getElementById(id).value = ''; });
  btn.textContent = '確認下單'; btn.disabled = false;
  document.getElementById('success-order-id').textContent = orderId;
  document.getElementById('product-area').style.display = 'none';
  document.getElementById('success-page').classList.add('show');
  window.scrollTo(0, 0);
}
function backToShop() {
  document.getElementById('product-area').style.display = '';
  document.getElementById('success-page').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
