<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuyuz_98 — 偶像週邊專賣</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#f5f0e8;--brown:#8b6f47;--dark:#2c2018;--mid:#6b4f35;
  --border:#e0d8cc;--light:#faf8f4;--text-muted:#999;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);font-family:'Hiragino Sans','Noto Sans TC',sans-serif;color:var(--dark);min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{font-size:18px;font-weight:700;color:var(--dark);letter-spacing:0.05em}
.nav-logo span{color:var(--brown)}
.nav-cart{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--brown);color:#fff;border:none;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.nav-cart:hover{background:var(--mid)}
.cart-count{background:#fff;color:var(--brown);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* HERO */
.hero{background:#fff;border-bottom:1px solid var(--border);padding:32px 24px;text-align:center}
.hero-title{font-size:28px;font-weight:700;color:var(--dark);margin-bottom:6px}
.hero-sub{font-size:14px;color:var(--text-muted)}

/* CAT TABS */
.cat-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;white-space:nowrap;position:sticky;top:56px;z-index:40}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{display:inline-block;padding:14px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.cat-tab.active{color:var(--brown);border-bottom-color:var(--brown)}
.cat-tab:hover:not(.active){color:var(--dark)}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:24px}
.cat-section{margin-bottom:32px}
.cat-section-title{font-size:13px;font-weight:700;color:var(--brown);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}

/* PRODUCT CARD */
.product-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:transform 0.15s,box-shadow 0.15s;cursor:pointer}
.product-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(44,32,24,0.1)}
.product-card.in-cart{border-color:var(--brown);border-width:1.5px}
.pc-img{width:100%;aspect-ratio:1;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-img .cart-dot{position:absolute;top:8px;right:8px;background:var(--brown);color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.pc-info{padding:12px}
.pc-name{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:4px;line-height:1.4}
.pc-price{font-size:13px;color:var(--brown);font-weight:500}
.pc-controls{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.pc-spec select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--light);color:var(--dark);cursor:pointer}
.pc-qty{display:flex;align-items:center;justify-content:space-between}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:background 0.1s}
.qty-btn:hover{background:var(--light)}
.qty-num{font-size:14px;font-weight:600;min-width:20px;text-align:center}
.qty-price{font-size:12px;color:var(--brown);font-weight:600}
.pc-add{width:100%;padding:8px;background:var(--brown);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s}
.pc-add:hover{background:var(--mid)}

/* MODAL & DRAWER COMMON */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:16px;width:480px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr-title{font-size:16px;font-weight:700}
.modal-x{width:32px;height:32px;border:none;background:var(--light);border-radius:8px;cursor:pointer;font-size:20px;color:var(--text-muted)}
.modal-body{padding:20px;overflow-y:auto;flex:1}

/* CART DRAWER */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(44,32,24,0.4);z-index:100}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:100vw;background:#fff;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s ease}
.cart-overlay.open .cart-drawer{transform:translateX(0)}
.cart-body{flex:1;overflow-y:auto;padding:16px 20px}
.cart-footer{padding:16px 20px;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px;color:var(--dark)}
.checkout-btn{width:100%;padding:14px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.15s}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2c2018;color:#fff;padding:12px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:300;transition:transform 0.3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* SUCCESS PAGE */
.success-page{display:none;text-align:center;padding:60px 20px}
.success-page.show{display:block}

@media(max-width:600px){
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cart-drawer{width:100vw}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">✦ <span>yuyuz_98</span></div>
  <div style="display:flex; gap:8px;">
    <button class="nav-cart" style="background:var(--mid); color:#fff;" onclick="openOrderLookup()">🔍 查訂單</button>
    <button class="nav-cart" onclick="openCart()">
      🛒 <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <div class="hero-title">✦ yuyuz_98</div>
  <div class="hero-sub">偶像週邊 · 美妝保養 · 服飾精選</div>
</div>

<div class="cat-bar" id="cat-bar"></div>

<div class="main">
  <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted)">載入商品中...</div>
  <div id="product-area"></div>
  
  <div class="success-page" id="success-page">
    <div style="font-size:64px;margin-bottom:16px">🎉</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:8px">下單成功！</div>
    <p style="color:var(--text-muted);margin-bottom:24px">感謝你的訂購，請保留訂單編號以便查詢。</p>
    <div id="success-order-id" style="font-size:18px;font-weight:700;color:var(--brown);background:var(--light);padding:12px;border-radius:10px;display:inline-block;margin-bottom:24px"></div>
    <br>
    <button class="nav-cart" style="padding:12px 32px; border-radius:10px" onclick="location.reload()">回到首頁</button>
  </div>
</div>

<div class="footer" style="text-align:center;padding:32px;color:var(--text-muted);font-size:12px;border-top:1px solid var(--border)">
  © yuyuz_98 · 所有商品皆為正品代購
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()">
  <div class="cart-drawer" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-hdr-title">購物車</span>
      <button class="modal-x" onclick="closeCart()">×</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>合計</span><span id="cart-total">NT$ 0</span></div>
      <button class="checkout-btn" id="checkout-btn" onclick="openCheckout()" disabled>前往結帳</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="checkout-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-hdr-title">填寫收件資料</span>
      <button class="modal-x" onclick="closeCheckout()">×</button>
    </div>
    <div class="modal-body">
      <div id="order-summary" style="background:var(--light);padding:15px;border-radius:10px;margin-bottom:20px;font-size:13px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px">
        <input id="f-name" placeholder="收件人姓名 *" style="padding:10px;border:1px solid var(--border);border-radius:8px">
        <input id="f-phone" placeholder="電話 09xx *" style="padding:10px;border:1px solid var(--border);border-radius:8px">
      </div>
      <input id="f-email" placeholder="Email" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <input id="f-store" placeholder="超商門市名稱" style="padding:10px;border:1px solid var(--border);border-radius:8px">
        <input id="f-storeno" placeholder="超商門市店號" style="padding:10px;border:1px solid var(--border);border-radius:8px">
      </div>
      <textarea id="f-note" placeholder="備註需求" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;min-height:60px"></textarea>
      <button class="checkout-btn" id="submit-btn" style="margin-top:20px" onclick="submitOrder()">確認下單</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="lookup-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-hdr">
      <span class="modal-hdr-title">訂單查詢</span>
      <button class="modal-x" onclick="closeLookup()">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:15px">
        <label style="display:block;margin-bottom:5px;font-size:14px">請輸入訂購時的電話號碼</label>
        <input type="text" id="lookup-phone" placeholder="09xxxxxxxx" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px">
      </div>
      <button class="checkout-btn" style="width:100%" onclick="doLookup()">開始查詢</button>
      <div id="lookup-result" style="margin-top:20px; max-height:350px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yxlpqbbugkbxcklmtkfx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bHBxYmJ1Z2tieGNrbG10a2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzcxNTYsImV4cCI6MjA5MjQ1MzE1Nn0.B_nPq2eZ_uq6cvxGa2JImftUQZ9Pi2gdGAXdES_Iiy4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let categories = [], products = [], cart = [], activeCat = 'all';
const pcQtyMap = {}, pcSpecMap = {};

async function init() {
  await loadData();
  renderCatBar();
  renderProducts();
}

async function loadData() {
  try {
    const [catRes, prodRes] = await Promise.all([
      sb.from('categories').select('*').order('sort_order'),
      sb.from('products').select('*').eq('online', true).order('sort_order')
    ]);
    categories = catRes.data || [];
    products = (prodRes.data || []).map(p => ({
      ...p, specs: typeof p.specs === 'string' ? JSON.parse(p.specs) : p.specs
    }));
  } catch(e) { console.log("載入失敗", e); }
  document.getElementById('loading').style.display = 'none';
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  const all = [{id:'all',label:'全部'}, ...categories];
  bar.innerHTML = all.map(c => `<span class="cat-tab ${activeCat===c.id?'active':''}" onclick="setCat('${c.id}')">${c.label}</span>`).join('');
}
function setCat(id) { activeCat = id; renderCatBar(); renderProducts(); }

function renderProducts() {
  const area = document.getElementById('product-area');
  const cats = activeCat === 'all' ? categories : [categories.find(c => c.id === activeCat)].filter(Boolean);
  let html = '';
  cats.forEach(cat => {
    const list = products.filter(p => p.cat_id === cat.id);
    if (list.length) {
      html += `<div class="cat-section"><div class="cat-section-title">${cat.label}</div><div class="product-grid">`;
      list.forEach(p => {
        const spec = pcSpecMap[p.id] || p.specs[0].name;
        const price = p.specs.find(s => s.name === spec).price;
        const qty = pcQtyMap[p.id] || 1;
        html += `<div class="product-card">
          <div class="pc-img">${p.photo ? `<img src="${p.photo}">` : `<span>${p.emoji||'🎁'}</span>`}</div>
          <div class="pc-info">
            <div class="pc-name">${p.name}</div>
            <div class="pc-price">NT$ ${price.toLocaleString()}</div>
          </div>
          <div class="pc-controls">
            <select style="width:100%;padding:5px;border-radius:5px" onchange="pcSpecMap[${p.id}]=this.value;renderProducts()">
              ${p.specs.map(s => `<option value="${s.name}" ${s.name===spec?'selected':''}>${s.name}</option>`).join('')}
            </select>
            <div class="pc-qty">
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="pcQtyMap[${p.id}]=Math.max(1,(pcQtyMap[${p.id}]||1)-1);renderProducts()">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="pcQtyMap[${p.id}]=(pcQtyMap[${p.id}]||1)+1;renderProducts()">+</button>
              </div>
            </div>
            <button class="pc-add" onclick="addToCart(${p.id})">加入購物車</button>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
  });
  area.innerHTML = html;
}

function addToCart(pid) {
  const p = products.find(x => x.id === pid);
  const spec = pcSpecMap[pid] || p.specs[0].name;
  const qty = pcQtyMap[pid] || 1;
  const price = p.specs.find(s => s.name === spec).price;
  cart.push({ cartId: Date.now(), productId: pid, product: p.name, spec, qty, price });
  showToast("已加入購物車！");
  renderCart();
}

function renderCart() {
  const body = document.getElementById('cart-body');
  const count = cart.reduce((s,i) => s+i.qty, 0);
  const total = cart.reduce((s,i) => s+(i.price*i.qty), 0);
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total').textContent = 'NT$ ' + total.toLocaleString();
  document.getElementById('checkout-btn').disabled = cart.length === 0;
  
  if(!cart.length) { body.innerHTML = '<div style="text-align:center;padding:40px;color:#999">購物車空空的</div>'; return; }
  body.innerHTML = cart.map(i => `
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee">
      <div><b>${i.product}</b><br><small>${i.spec} x ${i.qty}</small></div>
      <div style="text-align:right">NT$ ${(i.price*i.qty).toLocaleString()}<br><button onclick="cart=cart.filter(x=>x.cartId!==${i.cartId});renderCart()" style="border:none;background:none;color:red;font-size:12px">移除</button></div>
    </div>
  `).join('');
}

function openCart() { document.getElementById('cart-overlay').classList.add('open'); }
function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); }
function openOrderLookup() { document.getElementById('lookup-modal').classList.add('open'); }
function closeLookup() { document.getElementById('lookup-modal').classList.remove('open'); }

async function doLookup() {
  const phone = document.getElementById('lookup-phone').value.trim();
  if(!phone) return alert('請輸入電話');
  const res = document.getElementById('lookup-result');
  res.innerHTML = '搜尋中...';
  const { data } = await sb.from('orders').select('*').eq('phone', phone).order('created_at', {ascending: false});
  if(data && data.length > 0) {
    res.innerHTML = data.map(o => {
      const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
      return `<div style="border:1px solid var(--border); padding:12px; border-radius:10px; margin-bottom:10px; background:#fff; border-left:4px solid var(--brown)">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px"><b>${o.order_id}</b> <span style="font-size:12px;color:var(--brown)">${o.status||'處理中'}</span></div>
        <div style="font-size:12px;color:#666">${items.map(i => `• ${i.product}x${i.qty}`).join('<br>')}</div>
        <div style="text-align:right;font-weight:700;margin-top:5px">NT$ ${o.amount.toLocaleString()}</div>
      </div>`;
    }).join('');
  } else { res.innerHTML = '查無訂單，請確認電話是否正確。'; }
}

function openCheckout() {
  document.getElementById('checkout-modal').classList.add('open');
  const summary = cart.map(i => `<div>${i.product}(${i.spec}) x ${i.qty} - NT$ ${(i.price*i.qty).toLocaleString()}</div>`).join('');
  document.getElementById('order-summary').innerHTML = summary + `<hr style="margin:10px 0"><b>合計：NT$ ${cart.reduce((s,i)=>s+(i.price*i.qty),0).toLocaleString()}</b>`;
}
function closeCheckout() { document.getElementById('checkout-modal').classList.remove('open'); }

async function submitOrder() {
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  if(!name || !phone) return alert('請填寫必填欄位');
  
  const orderId = 'ORD' + Date.now().toString().slice(-6).toUpperCase();
  const { error } = await sb.from('orders').insert([{
    order_id: orderId, customer_name: name, phone: phone,
    email: document.getElementById('f-email').value,
    store: document.getElementById('f-store').value,
    store_no: document.getElementById('f-storeno').value,
    note: document.getElementById('f-note').value,
    amount: cart.reduce((s,i)=>s+(i.price*i.qty),0),
    items: JSON.stringify(cart),
    created_at: new Date().toISOString()
  }]);
  
  if(!error) {
    document.getElementById('success-order-id').textContent = orderId;
    document.getElementById('checkout-modal').classList.remove('open');
    document.getElementById('product-area').style.display = 'none';
    document.getElementById('success-page').classList.add('show');
    cart = []; renderCart();
  } else { alert('下單失敗，請稍後再試'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
